# Allow the PyO3 extension module (oxis-python, a cdylib) to build with plain
# `cargo build` on macOS: Python symbols are resolved at import time, not link
# time, so the linker must defer unresolved symbols. This is the PyO3-documented
# approach for building/testing without maturin. No effect on Linux/Windows
# targets (the cfgs don't match), and harmless for our other crates (they have
# no undefined symbols).
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]
